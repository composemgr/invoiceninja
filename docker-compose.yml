# nginx proxy address - http://172.17.0.1:60101
name: invoiceninja
x-logging: &default-logging
  options:
    max-size: "5m"
    max-file: "1"
  driver: json-file

services:
    app:
        image: invoiceninja/invoiceninja
        container_name: invoiceninja
        domainname: ${BASE_DOMAIN_NAME:-}
        hostname: ${BASE_HOST_NAME:-$HOSTNAME}
        restart: always 
        pull_policy: always
        environment:
            - DB_PASSWORD=ninja
            - DB_USERNAME=ninja
            - DB_DATABASE=ninja
            - DB_HOST=invoiceninja-db
            - DB_STRICT=false
            - DB_TYPE=mysql
            - REQUIRE_HTTPS=false
            - APP_CIPHER=AES-256-CBC
            - APP_DEBUG=0
            - 'APP_KEY=base64:RGK672GY56Df#$SR3998JHKYVBE45=' 
            - 'APP_URL=${BASE_HOST_NAME:-$HOSTNAME}'
            - IS_DOCKER=true
            - IN_USER_EMAIL=${APP_ADMIN_USER:-admin}@${BASE_HOST_NAME:-$HOSTNAME}
            - IN_PASSWORD=${APP_ADMIN_PASS:-fnrj2hdbgkhoqjdhgjg}
            - MAIL_MAILER=log
            - MAIL_HOST=${EMAIL_SERVER_HOST:-172.17.0.1}
            - MAIL_PORT=${EMAIL_SERVER_PORT:-587}
            - MAIL_USERNAME=null
            - MAIL_PASSWORD=null
            - MAIL_ENCRYPTION=${EMAIL_SERVER_ENCRYPTION:-tls}
            - 'MAIL_FROM_ADDRESS=user@example.com'
            - 'MAIL_FROM_NAME=${EMAIL_SERVER_FROM_NAME:-Invoice System}'
            - 'PDF_GENERATOR=snappdf' 
            - 'TRUSTED_PROXIES=*'
        ports:
            - '172.17.0.1:60101:9000'
        volumes:
            - '/var/invoiceninja/storage:/var/app/storage'
            - '/var/invoiceninja/public:/var/app/public'
        logging: *default-logging

  mysql:
    image: mysql:8
    container_name: invoiceninja-db
    restart: always 
    pull_policy: always 
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - app-network

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging


networks:
  app-network:
    driver: bridge
